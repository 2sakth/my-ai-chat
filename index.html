<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Ink — a quiet place to think with AI</title>
<meta name="description" content="A free, open chat with AI. No account walls, no clutter." />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Source+Serif+4:opsz,wght@8..60,400;8..60,500;8..60,600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --paper: #FAF8F4;
    --paper-dim: #F1EDE4;
    --ink: #1F1B16;
    --ink-soft: #5B5448;
    --clay: #C76F4A;
    --clay-dim: #E7C3B2;
    --sage: #E8EDE5;
    --sage-line: #C9D4C3;
    --rule: #DEDACE;
    --radius: 2px;
  }

  *{ box-sizing: border-box; }
  html,body{ height:100%; }
  body{
    margin:0;
    background:var(--paper);
    color:var(--ink);
    font-family:'Source Serif 4', Georgia, serif;
    -webkit-font-smoothing:antialiased;
  }
  ::selection{ background:var(--clay-dim); }

  .mono{ font-family:'JetBrains Mono', monospace; letter-spacing:0.02em; }

  /* ---------- layout shell ---------- */
  .shell{
    max-width: 760px;
    margin: 0 auto;
    min-height:100vh;
    display:flex;
    flex-direction:column;
    padding: 0 24px;
  }

  header.top{
    padding: 28px 0 18px;
    display:flex;
    align-items:baseline;
    justify-content:space-between;
    border-bottom: 1px solid var(--rule);
  }
  .brand{
    display:flex;
    align-items:baseline;
    gap: 10px;
  }
  .brand .mark{
    font-family:'JetBrains Mono', monospace;
    font-size: 13px;
    color: var(--clay);
    border: 1px solid var(--clay);
    border-radius: 50%;
    width: 22px; height: 22px;
    display:inline-flex; align-items:center; justify-content:center;
    transform: translateY(1px);
  }
  .brand h1{
    font-size: 19px;
    font-weight: 600;
    margin: 0;
    letter-spacing: 0.01em;
  }
  .top .tag{
    font-size: 11.5px;
    color: var(--ink-soft);
    text-transform: uppercase;
    letter-spacing: 0.08em;
  }

  /* ---------- conversation ---------- */
  main{
    flex:1;
    overflow-y:auto;
    padding: 28px 0 12px;
    display:flex;
    flex-direction:column;
    gap: 22px;
  }

  .empty{
    margin: auto 0;
    text-align:left;
    color: var(--ink-soft);
    padding: 40px 0;
  }
  .empty .big{
    font-size: 26px;
    color: var(--ink);
    line-height:1.4;
    max-width: 480px;
    margin: 0 0 18px;
  }
  .empty .caret{
    display:inline-block;
    width: 10px; height: 1.1em;
    background: var(--clay);
    vertical-align: text-bottom;
    animation: blink 1.1s steps(1) infinite;
  }
  @keyframes blink{ 50%{ opacity:0; } }

  .prompts{
    display:flex;
    flex-wrap:wrap;
    gap: 8px;
    margin-top: 8px;
  }
  .chip{
    font-family:'JetBrains Mono', monospace;
    font-size: 12.5px;
    color: var(--ink-soft);
    border: 1px solid var(--rule);
    background: transparent;
    padding: 8px 12px;
    border-radius: var(--radius);
    cursor:pointer;
    transition: border-color .15s ease, color .15s ease;
  }
  .chip:hover{ border-color: var(--clay); color: var(--ink); }

  .msg{
    display:flex;
    gap: 14px;
    max-width: 100%;
    animation: rise .28s ease both;
  }
  @keyframes rise{ from{ opacity:0; transform: translateY(6px);} to{ opacity:1; transform:none; } }

  .msg .avatar{
    flex: 0 0 auto;
    width: 26px; height: 26px;
    border-radius: 50%;
    font-family:'JetBrains Mono', monospace;
    font-size: 11px;
    display:flex; align-items:center; justify-content:center;
    margin-top: 3px;
  }
  .msg.user .avatar{ background: var(--ink); color: var(--paper); }
  .msg.ai .avatar{ border: 1px solid var(--clay); color: var(--clay); }

  .bubble{
    font-size: 16px;
    line-height: 1.65;
    padding: 12px 16px;
    border-radius: var(--radius);
    max-width: 86%;
    white-space: pre-wrap;
  }
  .msg.user .bubble{
    background: var(--paper-dim);
    border: 1px solid var(--rule);
  }
  .msg.ai .bubble{
    background: var(--sage);
    border: 1px solid var(--sage-line);
  }
  .msg .who{
    display:none;
  }

  .typing{
    display:inline-flex;
    gap: 4px;
    align-items:center;
    padding: 4px 0;
  }
  .typing span{
    width:5px; height:5px; border-radius:50%;
    background: var(--clay);
    animation: bounce 1.1s infinite ease-in-out;
  }
  .typing span:nth-child(2){ animation-delay: .15s; }
  .typing span:nth-child(3){ animation-delay: .3s; }
  @keyframes bounce{ 0%,80%,100%{ transform: translateY(0); opacity:.5;} 40%{ transform: translateY(-4px); opacity:1;} }

  /* ---------- composer ---------- */
  .composer{
    border-top: 1px solid var(--rule);
    padding: 16px 0 22px;
  }
  .line{
    display:flex;
    align-items:flex-end;
    gap: 10px;
    border-bottom: 2px solid var(--ink);
    padding-bottom: 8px;
  }
  .line:focus-within{ border-color: var(--clay); }
  .line textarea{
    flex:1;
    resize:none;
    border:none;
    outline:none;
    background:transparent;
    font-family:'JetBrains Mono', monospace;
    font-size: 15px;
    color: var(--ink);
    line-height: 1.5;
    max-height: 140px;
    padding: 6px 2px;
  }
  .line textarea::placeholder{ color: #A39B8B; }

  .send{
    flex: 0 0 auto;
    background: var(--ink);
    color: var(--paper);
    border: none;
    width: 34px; height: 34px;
    border-radius: var(--radius);
    cursor:pointer;
    display:flex; align-items:center; justify-content:center;
    transition: background .15s ease, transform .1s ease;
  }
  .send:hover{ background: var(--clay); }
  .send:active{ transform: scale(0.94); }
  .send:disabled{ opacity:.35; cursor:default; background:var(--ink); }

  .foot-row{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-top: 8px;
  }
  .hint{
    font-size: 11px;
    color: var(--ink-soft);
    font-family:'JetBrains Mono', monospace;
  }
  .clear-btn{
    font-family:'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--ink-soft);
    background:none;
    border:none;
    cursor:pointer;
    text-decoration: underline;
    text-underline-offset: 3px;
  }
  .clear-btn:hover{ color: var(--clay); }

  .error-banner{
    font-family:'JetBrains Mono', monospace;
    font-size: 12.5px;
    color: #8A3B23;
    background: #FBEAE2;
    border: 1px solid #E7B7A3;
    border-radius: var(--radius);
    padding: 10px 12px;
    margin-bottom: 12px;
  }

  @media (max-width: 560px){
    .shell{ padding: 0 16px; }
    .empty .big{ font-size: 21px; }
    .bubble{ font-size: 15px; max-width: 90%; }
  }

  @media (prefers-reduced-motion: reduce){
    *{ animation-duration: 0.001ms !important; animation-iteration-count: 1 !important; }
  }
</style>
</head>
<body>

<div class="shell">
  <header class="top">
    <div class="brand">
      <span class="mark">·</span>
      <h1>Ink</h1>
    </div>
    <span class="tag">free · no login</span>
  </header>

  <main id="thread">
    <div class="empty" id="emptyState">
      <p class="big">A quiet place to think out loud.<span class="caret"></span></p>
      <div class="prompts">
        <button class="chip" data-prompt="Explain quantum computing like I'm new to it">explain quantum computing</button>
        <button class="chip" data-prompt="Give me 5 ideas for a weekend side project">weekend project ideas</button>
        <button class="chip" data-prompt="Help me write a polite follow-up email">write a follow-up email</button>
        <button class="chip" data-prompt="What's a good way to learn to read faster?">learn to read faster</button>
      </div>
    </div>
  </main>

  <div class="composer">
    <div id="errorSlot"></div>
    <div class="line">
      <textarea id="input" rows="1" placeholder="Type something…" maxlength="4000"></textarea>
      <button class="send" id="sendBtn" aria-label="Send">
        <svg width="15" height="15" viewBox="0 0 16 16" fill="none"><path d="M1 8L15 1L9 15L7 9L1 8Z" stroke="currentColor" stroke-width="1.4" stroke-linejoin="round"/></svg>
      </button>
    </div>
    <div class="foot-row">
      <span class="hint">enter to send · shift+enter for new line</span>
      <button class="clear-btn" id="clearBtn">clear conversation</button>
    </div>
  </div>
</div>

<script>
  const thread = document.getElementById('thread');
  const emptyState = document.getElementById('emptyState');
  const input = document.getElementById('input');
  const sendBtn = document.getElementById('sendBtn');
  const clearBtn = document.getElementById('clearBtn');
  const errorSlot = document.getElementById('errorSlot');

  let history = []; // {role: 'user'|'model', text: string}
  let busy = false;

  function autoGrow(){
    input.style.height = 'auto';
    input.style.height = Math.min(input.scrollHeight, 140) + 'px';
  }
  input.addEventListener('input', autoGrow);

  document.querySelectorAll('.chip').forEach(chip=>{
    chip.addEventListener('click', ()=>{
      input.value = chip.dataset.prompt;
      autoGrow();
      input.focus();
    });
  });

  function showError(msg){
    errorSlot.innerHTML = `<div class="error-banner">${msg}</div>`;
  }
  function clearError(){ errorSlot.innerHTML = ''; }

  function renderMessage(role, text){
    if(emptyState) emptyState.style.display = 'none';
    const wrap = document.createElement('div');
    wrap.className = 'msg ' + (role === 'user' ? 'user' : 'ai');
    const avatar = document.createElement('div');
    avatar.className = 'avatar mono';
    avatar.textContent = role === 'user' ? 'you' : 'ai';
    const bubble = document.createElement('div');
    bubble.className = 'bubble';
    bubble.textContent = text;
    wrap.appendChild(avatar);
    wrap.appendChild(bubble);
    thread.appendChild(wrap);
    thread.scrollTop = thread.scrollHeight;
    return bubble;
  }

  function renderTyping(){
    const wrap = document.createElement('div');
    wrap.className = 'msg ai';
    wrap.id = 'typingRow';
    wrap.innerHTML = `<div class="avatar mono">ai</div><div class="bubble"><span class="typing"><span></span><span></span><span></span></span></div>`;
    thread.appendChild(wrap);
    thread.scrollTop = thread.scrollHeight;
  }
  function removeTyping(){
    const t = document.getElementById('typingRow');
    if(t) t.remove();
  }

  async function send(){
    const text = input.value.trim();
    if(!text || busy) return;
    clearError();
    busy = true;
    sendBtn.disabled = true;

    renderMessage('user', text);
    history.push({ role: 'user', text });
    input.value = '';
    autoGrow();
    renderTyping();

    try{
      const res = await fetch('/api/chat', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ history })
      });

      const data = await res.json();
      removeTyping();

      if(!res.ok){
        showError(data.error || 'Something went wrong. Try again in a moment.');
        history.pop(); // remove the unanswered user turn so retry is clean
        busy = false;
        sendBtn.disabled = false;
        return;
      }

      renderMessage('model', data.reply);
      history.push({ role: 'model', text: data.reply });
    }catch(err){
      removeTyping();
      showError('Could not reach the server. Check your connection and try again.');
      history.pop();
    }finally{
      busy = false;
      sendBtn.disabled = false;
      input.focus();
    }
  }

  sendBtn.addEventListener('click', send);
  input.addEventListener('keydown', (e)=>{
    if(e.key === 'Enter' && !e.shiftKey){
      e.preventDefault();
      send();
    }
  });

  clearBtn.addEventListener('click', ()=>{
    history = [];
    thread.innerHTML = '';
    thread.appendChild(emptyState);
    emptyState.style.display = 'block';
    clearError();
  });
</script>
</body>
</html>
